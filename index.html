<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Cute Billi 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay loop muted playsinline class="bg-video">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <!-- MUSIC PLAYER (Hidden) -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- FLOATING PAWS -->
    <div id="paws-container"></div>

    <!-- SCREEN 1: PASSCODE ENTRY -->
    <div id="screen-passcode" class="screen">
        <div class="avatar">🐱💖🐶</div>
        <h2>Knock Knock, Chidku!</h2>
        <p class="subtitle">Apna secret passcode daalo...</p>
        <div class="passcode-display" id="display">____</div>
        <div class="keypad">
            <button onclick="pressKey(1)">1</button>
            <button onclick="pressKey(2)">2</button>
            <button onclick="pressKey(3)">3</button>
            <button onclick="pressKey(4)">4</button>
            <button onclick="pressKey(5)">5</button>
            <button onclick="pressKey(6)">6</button>
            <button onclick="pressKey(7)">7</button>
            <button onclick="pressKey(8)">8</button>
            <button onclick="pressKey(9)">9</button>
            <button onclick="clearDisplay()" class="action-btn">C</button>
            <button onclick="pressKey(0)">0</button>
            <button onclick="clearDisplay()" class="action-btn">X</button>
        </div>
        <p id="error-msg" class="hidden">Wrong code, meri billi! Try again.</p>
    </div>

    <!-- SCREEN 2: GIFT CHOICE (5 BOXES) -->
    <div id="screen-gifts" class="screen hidden">
        <h2>Hello, Chidku Cutie 🥰</h2>
        <p class="subtitle">Choose a surprise box!</p>
        <div class="gift-container">
            <div class="gift-box" onclick="revealGift('message')">💌 <p>Message</p></div>
            <div class="gift-box" onclick="revealGift('photo')">📸 <p>Photo</p></div>
            <div class="gift-box" onclick="revealGift('pets')">🐾 <p>3D Pets</p></div>
            <div class="gift-box" onclick="revealGift('coupons')">🎟️ <p>Coupons</p></div>
            <div class="gift-box" onclick="revealGift('poem')">✨ <p>Surprise</p></div>
        </div>
    </div>

    <!-- SCREEN 3: THE SURPRISE REVEAL -->
    <div id="screen-reveal" class="screen hidden">
        <h2 id="reveal-title">Surprise!</h2>
        <div id="reveal-content" class="message-box">
            <!-- Content will be generated by JS -->
        </div>
        <button class="back-btn" onclick="backToGifts()">Wapas Jao</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
